id: writing_intent
category: dms
name: Writing Intent
description: >
  Extract a realistic author-facing writing intent from one target narrative
  unit for retrieval, social simulation, and generation.

task_variables:
  - name: unit_json
    type: string
    required: true
    description: JSON object for one target narrative unit.

static_variables:
  - name: intent_policy
    type: string
    required: true
    description: Project-level writing-intent abstraction rules.

template: |
  # Task
  Extract a realistic author writing intent from the current narrative unit.

  # Purpose
  The output simulates what an author might actually provide before writing
  this passage. It will be used as the only author-provided input for memory
  retrieval, social simulation, and writing generation.

  # Source
  Base the output on the current narrative-unit text only. Treat the title, subtitle, and body as source text.

  # Intent Policy
  {intent_policy}

  # Output Format
  Return exactly one JSON object using this schema. Include no Markdown or commentary.

  {
    "writing_intent": "string"
  }

  # Field Rules
  - writing_intent must be one compact sentence.
  - Write the intent in the same language as the source.
  - Keep it much shorter than the source text. It must never be longer than the source passage.
  - For Chinese, prefer no more than 120 non-whitespace characters. For English, prefer no more than 80 words.
  - Capture only the broad authorial purpose: scene situation, central characters, main location, key object/vehicle/facility, relationship pressure, atmosphere, or transition.
  - Keep concrete anchors that an author would naturally know when proposing the scene, such as central character names, main location, key vehicle/facility, mission target, or immediate setup.
  - Do not over-abstract the intent into anonymous roles if the source clearly centers named characters or objects.
  - Do not include target outcomes, exact dialogue, beat lists, evidence spans, full synopsis, line-by-line actions, or overly specific choreography.
  - Return no fields beyond writing_intent.
  - Do not add unit_id; the runner already knows the input narrative unit id.
  - Do not include retrieval instructions such as what to retrieve, query, recall, look up, or rank.

  # Current Narrative Unit
  {unit_json}
