id: writing_intent_detailed
category: dms
name: Detailed Writing Intent
description: >
  Extract a detailed author-facing writing intent from one target narrative
  unit for memory retrieval, generation, and evaluation.

task_variables:
  - name: unit_json
    type: string
    required: true
    description: JSON object for one target narrative unit.

static_variables:
  - name: intent_policy
    type: string
    required: true
    description: Project-level detailed-intent abstraction rules.

template: |
  # Task
  Extract a detailed writing intent from the current narrative unit.

  # When To Use This
  Use this level when the author already has a reasonably clear direction for
  the next passage. The output should be specific enough to drive memory
  retrieval, writing, and intent-consistency evaluation, while still avoiding a
  full scene outline.

  # Source
  Base the output only on the current narrative-unit text. Treat the title,
  subtitle, and body as source text.

  # Intent Policy
  {intent_policy}

  # Output Format
  Return exactly one JSON object using this schema. Include no Markdown or commentary.

  {
    "unit_id": "string",
    "writing_intent": "string"
  }

  # Field Rules
  - unit_id must match the input narrative unit.
  - writing_intent must be one compact paragraph, usually one to three sentences.
  - Write the intent in the same language as the source.
  - Capture the scene's author-facing purpose: narrative function, emotional direction, relationship dynamic, atmosphere, transition, pressure, or stakes.
  - Keep concrete anchors that an author would naturally know when proposing the scene, such as central character names, main location, key object, vehicle, facility, organization, occasion, mission target, or immediate setup.
  - Do not over-abstract the intent into anonymous roles if the source clearly centers named characters, places, objects, or organizations.
  - Avoid exact dialogue, evidence spans, line-by-line actions, and overly specific choreography unless a concrete action is necessary to state the writing purpose.
  - Do not turn the output into a full synopsis, outline, beat list, retrieval plan, query plan, or evaluation checklist.
  - Return no fields beyond unit_id and writing_intent.

  # Current Narrative Unit
  {unit_json}
