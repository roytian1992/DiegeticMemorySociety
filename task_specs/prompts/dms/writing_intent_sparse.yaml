id: writing_intent_sparse
category: dms
name: Sparse Writing Intent
description: >
  Extract a sparse exploratory author seed from one target narrative unit.

task_variables:
  - name: unit_json
    type: string
    required: true
    description: JSON object for one target narrative unit.

static_variables:
  - name: intent_policy
    type: string
    required: true
    description: Project-level sparse-intent abstraction rules.

template: |
  # Task
  Extract a sparse exploratory author seed from the current narrative unit.

  # When To Use This
  Use this level when the author has not decided the next passage in detail.
  The output should provide only a small starting condition for exploratory
  character or social simulation. It is not a retrieval query and not a final
  prose prompt.

  # Source
  Base the output only on the current narrative-unit text. Treat the title,
  subtitle, and body as source text.

  # Intent Policy
  {intent_policy}

  # Output Format
  Return exactly one JSON object using this schema. Include no Markdown or commentary.

  {
    "unit_id": "string",
    "writing_intent": "string"
  }

  # Field Rules
  - unit_id must match the input narrative unit.
  - writing_intent must be one compact sentence.
  - Write the intent in the same language as the source.
  - Include only the minimal anchors an author would likely provide before exploration: central character names, broad location, important object/vehicle/facility, or immediate situation.
  - Prefer open scene conditions over planned plot beats.
  - Leave character choices, dialogue, emotional turns, and outcomes open unless the source's central premise cannot be stated without them.
  - Keep the intent under-specified enough that a social simulation can explore plausible interactions from memory.
  - Do not include exact dialogue, exact choreography, line-by-line actions, outcomes, reveals, summaries, evidence spans, retrieval instructions, or query plans.
  - Do not add fields such as seed_entities, retrieval_needs, query_plan, scene_beats, or references.

  # Current Narrative Unit
  {unit_json}
