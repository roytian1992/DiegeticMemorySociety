id: reference_items
category: dms
name: External Reference Items
description: >
  Extract flat author-reference items from one external reference-library chunk.

task_variables:
  - name: reference_chunk_json
    type: string
    required: true
    description: JSON object for one chunk from the external reference library.

static_variables:
  - name: extraction_policy
    type: string
    required: true
    description: Project-level reference item extraction rules.

template: |
  # Task
  Extract reusable external reference items from the current reference chunk.

  # Purpose
  The reference chunk may mix world bible facts, character profiles, timeline notes, locations, organizations, style guidance, and ordinary author notes. Split the useful material into flat items that can later be retrieved and inserted into a memory packet.

  # Source Rules
  Base every item only on the current reference chunk: title, heading, and content.
  The reference chunk is outside the story text. Treat unclear facts as author-facing reference context, not as something every character knows.
  If the input is Chinese, write natural-language output fields in Chinese except exact names, codes, acronyms, and official titles.
  Use a compact number of high-value items. Avoid sentence-by-sentence copying.

  # Extraction Policy
  {extraction_policy}

  # Output Format
  Return exactly one JSON object using this schema. Include no Markdown or commentary.

  {
    "chunk_id": "string",
    "reference_items": [
      {
        "item_type": "world_bible | character_profile | relationship_fact | timeline_doc | location_doc | organization_fact | style_guide | author_note",
        "subject": "string",
        "statement": "string",
        "evidence": "string",
        "knowledge_scope": "author_only | world_public | character_private | revealed_by_story | style_only",
        "known_to": ["string"],
        "available_from": "story_start | scene_0001 | unknown",
        "timeline_hint": "string",
        "authority": 0.0,
        "confidence": 0.0
      }
    ]
  }

  # Field Rules
  - chunk_id must match the current reference chunk id.
  - Use only the listed item_type and knowledge_scope labels.
  - Keep all output fields flat. Do not add nested objects.
  - statement is a concise reusable fact, profile note, timeline note, or style note supported by the chunk.
  - evidence must be one short verbatim span from title, heading, or content. Do not paraphrase evidence.
  - Do not stitch multiple evidence spans together. Choose the clearest contiguous span.
  - known_to is ["all"] only when the chunk clearly says the fact is public or globally known in-world.
  - Use knowledge_scope=world_public only for broadly public in-world facts.
  - Use knowledge_scope=character_private only when the chunk explicitly says a character knows, believes, hides, or privately experiences the fact; then known_to must name that character or group.
  - Use knowledge_scope=revealed_by_story when the fact is not generally known at story start but becomes available after an explicit scene or event; set available_from when clear, otherwise "unknown".
  - Use knowledge_scope=style_only for style_guide items. Style items are writing guidance, not diegetic facts.
  - Use knowledge_scope=author_only for author-facing background, production notes, unclear visibility, and anything that should not be automatically visible to characters.
  - timeline_hint should contain a short natural-language time cue when the chunk provides one, such as an absolute year, period, before/after relation, or unknown.
  - authority and confidence must be numbers from 0 to 1.
  - Use an empty reference_items array if the chunk contains no useful reusable item.

  # Reference Chunk
  {reference_chunk_json}
